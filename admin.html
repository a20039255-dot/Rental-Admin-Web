<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部點收系統 - 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-800 text-white p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl flex items-center">
                <span class="bg-blue-600 p-1.5 rounded-lg mr-3">🛠️</span>
                設備部管理系統 <span class="ml-3 px-2 py-1 bg-gray-700 rounded text-xs text-blue-300 border border-gray-600" id="adminTag">載入中...</span>
            </h1>
            <div class="flex items-center gap-4">
                <span id="currentTime" class="hidden md:block text-gray-400 text-sm"></span>
                <button onclick="logout()" class="text-gray-400 hover:text-white transition">登出</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">快速搜尋</h3>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋學號、姓名或設備名稱..." 
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="text-sm font-bold text-indigo-500 mb-3 uppercase tracking-wider">學號批量點收</h3>
                <div class="flex gap-2">
                    <input type="text" id="batchSid" placeholder="輸入學號..." 
                        class="flex-1 px-4 py-3 border border-indigo-100 bg-indigo-50 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-mono">
                    <button onclick="batchReturn()" id="batchBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-md transition">
                        全部歸還
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">目前借用中清單</h2>
                    <p class="text-sm text-gray-500 mt-1">即時同步 Google Sheets 數據</p>
                </div>
                <button onclick="loadTransactions()" class="flex items-center gap-2 bg-white border border-gray-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition active:scale-95">
                    <span id="refreshIcon">🔄</span> 重新整理
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-400 text-xs uppercase tracking-widest border-b">
                            <th class="p-4 font-bold">交易 ID</th>
                            <th class="p-4 font-bold">借用人資訊</th>
                            <th class="p-4 font-bold">借用設備</th>
                            <th class="p-4 font-bold">借用時間</th>
                            <th class="p-4 font-bold text-center">狀態</th>
                            <th class="p-4 font-bold text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            
            <div id="noData" class="hidden p-20 text-center">
                <div class="text-5xl mb-4">🎉</div>
                <p class="text-gray-400 font-medium">目前沒有任何待歸還設備</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        window.onload = function() {
            const name = localStorage.getItem('adminName');
            if(!name) {
                alert("請先登入幹部帳號！");
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminTag').innerText = name;
            loadTransactions();
            
            // 每分鐘更新一次時間
            setInterval(() => {
                document.getElementById('currentTime').innerText = new Date().toLocaleString();
            }, 1000);
        };

        // 1. 抓取所有借用中交易
        function loadTransactions() {
            const table = document.getElementById('transactionTable');
            const noData = document.getElementById('noData');
            const refreshIcon = document.getElementById('refreshIcon');
            
            refreshIcon.classList.add('animate-spin');
            table.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-gray-400">📡 正在從 Google Sheets 讀取最新紀錄...</td></tr>';

            fetch(`${API_URL}/transactions`)
                .then(res => res.json())
                .then(data => {
                    refreshIcon.classList.remove('animate-spin');
                    table.innerHTML = '';
                    const list = Object.values(data);
                    
                    if(list.length === 0) {
                        noData.classList.remove('hidden');
                        return;
                    }

                    noData.classList.add('hidden');
                    list.forEach(t => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-blue-50/30 transition group";
                        tr.innerHTML = `
                            <td class="p-4 font-mono text-xs text-gray-400">#${t.交易編號}</td>
                            <td class="p-4">
                                <div class="font-bold text-gray-800">${t.租借人員姓名}</div>
                                <div class="text-xs text-gray-400 font-mono">${t.租借人員學號}</div>
                            </td>
                            <td class="p-4">
                                <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-bold border border-blue-100">
                                    ${t.設備名稱}
                                </span>
                            </td>
                            <td class="p-4">
                                <div class="text-sm text-gray-600">${t.借用時間}</div>
                                <div class="text-[10px] text-gray-400 mt-0.5">已借用 ${t.已借用天數} 天</div>
                            </td>
                            <td class="p-4 text-center">
                                <span class="px-3 py-1 rounded-lg text-xs font-black uppercase tracking-tighter ${t.是否過期 ? 'bg-red-500 text-white animate-pulse' : 'bg-green-100 text-green-700'}">
                                    ${t.是否過期 ? '⚠️ 已逾期' : '借用中'}
                                </span>
                            </td>
                            <td class="p-4 text-right">
                                <button onclick="returnItem(${t.交易編號}, '${t.設備名稱}')" 
                                    class="bg-white border border-gray-200 text-gray-700 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 px-4 py-2 rounded-xl text-sm font-bold shadow-sm transition-all duration-200 active:scale-95">
                                    點收歸還
                                </button>
                            </td>
                        `;
                        table.appendChild(tr);
                    });
                })
                .catch(err => {
                    refreshIcon.classList.remove('animate-spin');
                    table.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">❌ 無法連線至後端大腦</td></tr>`;
                });
        }

        // 2. 單筆歸還
        function returnItem(tid, name) {
            if(!confirm(`確定要歸還「${name}」嗎？\n系統將自動增加試算表庫存並紀錄點收人。`)) return;

            const adminName = localStorage.getItem('adminName');
            
            fetch(`${API_URL}/return`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "交易編號": tid,
                    "點收幹部": adminName
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.成功) {
                    loadTransactions(); 
                } else {
                    alert("❌ 歸還失敗：" + data.訊息);
                }
            });
        }

        // 3. 依學號批量歸還
        function batchReturn() {
            const sid = document.getElementById('batchSid').value.trim();
            const adminName = localStorage.getItem('adminName');
            const btn = document.getElementById('batchBtn');

            if (!sid) return alert("請輸入學號");
            if (!confirm(`確定要將學號「${sid}」的所有借用設備一次點收歸還嗎？`)) return;

            btn.innerText = "⏳ 處理中...";
            btn.disabled = true;

            fetch(`${API_URL}/return_by_student`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "學號": sid,
                    "點收幹部": adminName
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.成功) {
                    alert(`✅ 批量點收成功！共處理 ${data.歸還數量} 筆紀錄。`);
                    document.getElementById('batchSid').value = '';
                    loadTransactions();
                } else {
                    alert("❌ 處理失敗：" + data.訊息);
                }
            })
            .finally(() => {
                btn.innerText = "全部歸還";
                btn.disabled = false;
            });
        }

        // 4. 表格關鍵字篩選
        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].innerText.toUpperCase();
                rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
