<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備管理後台 - 數位化最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .pending-row { border-left: 6px solid #fbbf24; }
        .btn-processing { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="text-slate-900 pb-10">

    <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-lg md:text-xl flex items-center tracking-tight">
                <span class="bg-blue-600 p-2 rounded-xl mr-3 shadow-inner text-sm">🛠️</span>
                設備管理後台 <span id="adminTag" class="ml-3 px-3 py-1 bg-slate-800 rounded-full text-[10px] text-blue-300 border border-slate-700 font-mono italic hidden sm:inline-block">Loading...</span>
            </h1>
            <button onclick="logout()" class="text-slate-400 hover:text-rose-400 transition font-bold text-xs md:text-sm bg-slate-800 px-3 py-1.5 rounded-lg">登出系統</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-[0.2em]">精準搜尋與批量決策</h3>
                <div class="relative mb-4">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">🔍</span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋姓名、學號、單位、電話..." 
                        class="w-full pl-12 pr-4 py-4 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 text-sm font-medium">
                </div>
                
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-blue-50/50 p-4 rounded-2xl border border-dashed border-blue-200">
                    <div class="text-xs font-bold text-blue-600">
                        目前搜尋結果中：<span id="filteredCount" class="text-lg">0</span> 筆待審核
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="processFiltered('核准')" id="btnFilterApprove" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-xs font-black shadow-md transition transform active:scale-95">
                            ✅ 搜尋結果全核准
                        </button>
                        <button onclick="processFiltered('駁回')" id="btnFilterReject" class="flex-1 md:flex-none bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl text-xs font-black shadow-md transition transform active:scale-95">
                            ❌ 搜尋結果全駁回
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 text-white flex flex-col justify-center relative overflow-hidden">
                <div class="absolute -right-6 -top-6 text-6xl opacity-10">📥</div>
                <h3 class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-[0.2em] relative z-10">學號末三碼批量歸還</h3>
                <div class="flex gap-2 relative z-10">
                    <input type="text" id="batchSid" placeholder="輸入後 3 碼..." maxlength="3"
                        class="flex-1 px-4 py-3 bg-slate-800 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-white text-base text-center tracking-[0.5em] font-bold">
                    <button onclick="batchReturn()" id="batchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-black shadow-lg transition text-xs tracking-wider">
                        全歸還
                    </button>
                </div>
                <p class="text-[9px] text-slate-500 mt-3 text-center italic relative z-10">適合同學報完學號後快速結案</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-5 md:p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h2 class="text-base md:text-lg font-black text-slate-800 tracking-tight">管理清單</h2>
                <button onclick="loadTransactions()" class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-black text-slate-600 hover:bg-slate-50 transition shadow-sm active:scale-95">
                    <span id="refreshIcon">🔄</span> <span class="hidden sm:inline">重新整理</span>
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b bg-white">
                            <th class="p-6 w-16">ID</th>
                            <th class="p-6">借用人資訊</th>
                            <th class="p-6">設備品項</th>
                            <th class="p-6 text-center">狀態 / 點收紀錄</th>
                            <th class="p-6 text-right pr-8">管理決策</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-24 text-center text-slate-300 font-bold italic">目前沒有交易紀錄</div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        window.onload = function() {
            const name = localStorage.getItem('adminName');
            if(!name) { window.location.href = 'index.html'; return; }
            document.getElementById('adminTag').innerText = `幹部：${name}`;
            loadTransactions();
        };

        // 1. 載入紀錄
        async function loadTransactions() {
            const table = document.getElementById('transactionTable');
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('animate-spin');
            table.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-slate-300 font-bold animate-pulse">📡 資料同步中...</td></tr>';

            try {
                const res = await fetch(`${API_URL}/transactions`);
                if(!res.ok) throw new Error("API連線失敗");
                const data = await res.json();
                
                refreshIcon.classList.remove('animate-spin');
                table.innerHTML = '';
                const list = Object.values(data).sort((a, b) => b.交易編號 - a.交易編號);
                
                if(list.length === 0) { document.getElementById('noData').classList.remove('hidden'); return; }
                document.getElementById('noData').classList.add('hidden');

                list.forEach(t => {
                    const isPending = t.狀態 === "待審核";
                    const isReturned = t.狀態 === "已歸還";
                    const tr = document.createElement('tr');
                    tr.className = isPending ? "pending-row bg-amber-50/40 transition hover:bg-amber-50" : "hover:bg-slate-50 transition";
                    
                    // 🌟 歸還時間顯示邏輯
                    const returnTimeInfo = (isReturned && t.歸還時間) 
                        ? `<div class="text-[9px] text-emerald-500 font-medium mt-1">🕒 還：${t.歸還時間}</div>` 
                        : "";

                    tr.innerHTML = `
                        <td class="p-6 font-mono text-[10px] text-slate-300">#${t.交易編號}</td>
                        <td class="p-6">
                            <div class="font-black text-slate-800 text-sm">${t.租借人員姓名}</div>
                            <div class="text-[10px] text-slate-400 font-mono mt-0.5 tracking-tight">${t.租借人員學號}</div>
                        </td>
                        <td class="p-6">
                            <span class="bg-white border border-slate-200 px-3 py-1.5 rounded-xl text-xs font-black text-slate-600 shadow-sm">${t.設備名稱}</span>
                            <div class="text-[9px] text-slate-400 mt-1.5 font-mono italic pl-1">借：${t.借用時間}</div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-widest border ${isPending ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}">
                                ${t.狀態}
                            </span>
                            <div class="text-[9px] text-slate-400 mt-2 font-black italic">處理人: <span class="${isPending?'text-slate-300':'text-blue-500'}">${t.處理人員||'未處理'}</span></div>
                            ${returnTimeInfo}
                        </td>
                        <td class="p-6 text-right pr-8 space-x-2">
                            ${isPending ? 
                                `<button onclick="processSingle(${t.交易編號}, '核准')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md hover:bg-emerald-700 transition active:scale-95">核准</button>
                                 <button onclick="processSingle(${t.交易編號}, '駁回')" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md hover:bg-rose-600 transition active:scale-95">駁回</button>` :
                                (t.狀態 === "借用中" ? 
                                    `<button onclick="returnItem(${t.交易編號}, '${t.設備名稱}')" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-md hover:bg-black transition active:scale-95">點收歸還</button>` :
                                    `<span class="text-[10px] text-slate-300 font-black italic">結案</span>`
                                )
                            }
                        </td>`;
                    table.appendChild(tr);
                });
                filterTable(); 
            } catch (e) { 
                console.error(e);
                table.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-rose-500 font-black">❌ 連線失敗，請確認後端 API 是否啟動</td></tr>`;
            }
        }

        // 2. 🌟 精準搜尋過濾 (跳過 ID 欄位)
        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            let pendingCount = 0;
            for (let i = 0; i < rows.length; i++) {
                if(!rows[i].cells[1]) continue;
                // 只搜尋「借用人資訊(cells[1])」與「設備品項(cells[2])」
                const userInfoText = rows[i].cells[1].innerText.toUpperCase();
                const equipText = rows[i].cells[2].innerText.toUpperCase();
                
                const isMatch = userInfoText.includes(input) || equipText.includes(input);
                const isPending = rows[i].innerText.includes("待審核");
                
                rows[i].style.display = isMatch ? "" : "none";
                if (isMatch && isPending) pendingCount++;
            }
            document.getElementById('filteredCount').innerText = pendingCount;
        }

        // 3. 批量核准/駁回
        async function processFiltered(action) {
            const pendingIds = [];
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            for (let row of rows) {
                if (row.style.display !== "none" && row.innerText.includes("待審核")) {
                    const tid = row.cells[0].innerText.replace(/[^0-9]/g, '').trim();
                    if(tid) pendingIds.push(tid);
                }
            }
            if (pendingIds.length === 0) return alert("目前畫面上沒有可處理的申請件！");
            if (!confirm(`確認針對目前顯示的 ${pendingIds.length} 筆執行「${action}」嗎？`)) return;

            const btn = action === '核准' ? document.getElementById('btnFilterApprove') : document.getElementById('btnFilterReject');
            const originalText = btn.innerText;
            btn.classList.add('btn-processing');

            for (let i = 0; i < pendingIds.length; i++) {
                btn.innerText = `⏳ (${i+1}/${pendingIds.length})`;
                await fetch(`${API_URL}/admin/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "交易編號": pendingIds[i], "動作": action, "點收幹部": localStorage.getItem('adminName') })
                });
                await new Promise(r => setTimeout(r, 600)); 
            }
            btn.innerText = originalText;
            btn.classList.remove('btn-processing');
            loadTransactions();
        }

        // 4. 單筆操作
        function processSingle(tid, action) {
            if(!confirm(`確定要${action}此筆申請？`)) return;
            fetch(`${API_URL}/admin/approve`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "動作": action, "點收幹部": localStorage.getItem('adminName') })
            }).then(() => loadTransactions());
        }

        function returnItem(tid, name) {
            if(!confirm(`確認點收歸還「${name}」？`)) return;
            fetch(`${API_URL}/return`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "點收幹部": localStorage.getItem('adminName') })
            }).then(() => loadTransactions());
        }

        // 5. 末三碼批量歸還
        function batchReturn() {
            const sid = document.getElementById('batchSid').value.trim();
            if (sid.length < 3) return alert("部長，為了避免誤刷，請輸入學號「末三碼」喔！");
            
            const btn = document.getElementById('batchBtn');
            btn.innerText = "⏳ 處理中...";
            btn.disabled = true;

            fetch(`${API_URL}/return_by_student`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "學號": sid, "點收幹部": localStorage.getItem('adminName') })
            }).then(res => res.json()).then(data => {
                if(data.成功) {
                    alert(`✅ 點收成功！已自動處理 ${data.歸還數量} 件設備。`);
                    document.getElementById('batchSid').value = '';
                    loadTransactions();
                } else alert("❌ 找不到該同學的借用紀錄");
            }).finally(() => { 
                btn.innerText = "全歸還"; 
                btn.disabled = false;
            });
        }

        // 支援 Enter 鍵快捷歸還
        document.getElementById('batchSid').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') batchReturn();
        });

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
