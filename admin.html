<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備管理後台 - 數位化最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .pending-row { border-left: 6px solid #fbbf24; }
        .loading-active { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-slate-900 text-white p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl flex items-center tracking-tight">
                <span class="bg-blue-600 p-2 rounded-xl mr-3 shadow-inner">🛠️</span>
                設備管理後台 <span id="adminTag" class="ml-3 px-3 py-1 bg-slate-800 rounded-full text-[10px] text-blue-300 border border-slate-700 font-mono">載入身分中...</span>
            </h1>
            <button onclick="logout()" class="text-slate-400 hover:text-rose-400 transition font-bold text-sm">登出系統</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">精準篩選與批量決策</h3>
                <div class="relative mb-4">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">🔍</span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋姓名、學號、單位、電話或設備..." 
                        class="w-full pl-12 pr-4 py-4 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 text-sm">
                </div>
                
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-blue-50/50 p-4 rounded-2xl border border-dashed border-blue-200">
                    <div class="text-xs font-bold text-blue-600">
                        目前搜尋結果中：<span id="filteredCount" class="text-lg">0</span> 筆待審核
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="processFiltered('核准')" id="btnFilterApprove" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-md transition transform active:scale-95">
                            ✅ 搜尋結果全核准
                        </button>
                        <button onclick="processFiltered('駁回')" id="btnFilterReject" class="bg-rose-500 hover:bg-rose-600 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-md transition transform active:scale-95">
                            ❌ 搜尋結果全駁回
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 text-white flex flex-col justify-center">
                <h3 class="text-[10px] font-black text-slate-500 mb-3 uppercase tracking-widest">學號批量點收歸還</h3>
                <div class="flex gap-2">
                    <input type="text" id="batchSid" placeholder="輸入學號..." 
                        class="flex-1 px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none font-mono text-white text-sm">
                    <button onclick="batchReturn()" id="batchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-black shadow-lg transition text-xs">
                        全歸還
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h2 class="text-lg font-black text-slate-800 tracking-tight">管理清單</h2>
                <button onclick="loadTransactions()" class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-5 py-2.5 rounded-xl text-xs font-black text-slate-600 hover:bg-slate-100 transition shadow-sm active:scale-95">
                    <span id="refreshIcon">🔄</span> 重新整理
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b">
                            <th class="p-6">ID</th>
                            <th class="p-6">借用人資訊</th>
                            <th class="p-6">設備品項</th>
                            <th class="p-6 text-center">狀態 / 處理幹部</th>
                            <th class="p-6 text-right">管理決策</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-24 text-center text-slate-300 font-bold italic">目前沒有待處理事項</div>
        </div>
    </div>

    <script>
        // 🌟 請確保此網址與你的 Cloud Run 網址完全一致
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        window.onload = function() {
            const name = localStorage.getItem('adminName');
            if(!name) { window.location.href = 'index.html'; return; }
            document.getElementById('adminTag').innerText = `部長：${name}`;
            loadTransactions();
        };

        // 1. 載入紀錄 (強化連線偵錯)
        async function loadTransactions() {
            const table = document.getElementById('transactionTable');
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('animate-spin');
            table.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-slate-300 font-bold animate-pulse italic">📡 正在同步雲端大腦，若載入過久請檢查 API 網址...</td></tr>';

            try {
                const response = await fetch(`${API_URL}/transactions`);
                if (!response.ok) throw new Error("後端回應錯誤");
                const data = await response.json();
                
                refreshIcon.classList.remove('animate-spin');
                table.innerHTML = '';
                const list = Object.values(data).sort((a, b) => b.交易編號 - a.交易編號);
                
                if(list.length === 0) { document.getElementById('noData').classList.remove('hidden'); return; }
                document.getElementById('noData').classList.add('hidden');

                list.forEach(t => {
                    const isPending = t.狀態 === "待審核";
                    const tr = document.createElement('tr');
                    tr.className = isPending ? "pending-row bg-amber-50/40 transition" : "hover:bg-slate-50 transition";
                    
                    tr.innerHTML = `
                        <td class="p-6 font-mono text-xs text-slate-300">#${t.交易編號}</td>
                        <td class="p-6">
                            <div class="font-black text-slate-800 text-sm">${t.租借人員姓名}</div>
                            <div class="text-[10px] text-slate-400 font-mono mt-1 italic">${t.租借人員學號}</div>
                        </td>
                        <td class="p-6">
                            <span class="bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-600 shadow-sm">${t.設備名稱}</span>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-widest border ${isPending ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}">
                                ${t.狀態}
                            </span>
                            <div class="text-[9px] text-slate-400 mt-2 font-black italic">處理人: <span class="${isPending?'text-slate-200':'text-blue-500'}">${t.處理人員||'尚未核准'}</span></div>
                        </td>
                        <td class="p-6 text-right space-x-2">
                            ${isPending ? 
                                `<button onclick="processSingle(${t.交易編號}, '核准')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">核准</button>
                                 <button onclick="processSingle(${t.交易編號}, '駁回')" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">駁回</button>` :
                                `<button onclick="returnItem(${t.交易編號}, '${t.設備名稱}')" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg">點收歸還</button>`
                            }
                        </td>`;
                    table.appendChild(tr);
                });
                filterTable(); 
            } catch (error) {
                refreshIcon.classList.remove('animate-spin');
                table.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-rose-500 font-black">❌ 無法連線至後端 API<br><span class="text-xs font-normal text-slate-400">請確認 Cloud Run 網址或 CORS 設定</span></td></tr>`;
                console.error("Fetch Error:", error);
            }
        }

        // 2. 搜尋與計數
        function filterTable() {
    const input = document.getElementById("searchInput").value.toUpperCase();
    const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
    let pendingCount = 0;
    
    for (let i = 0; i < rows.length; i++) {
        // 🌟 改進點：我們只抓取「借用人資訊」這一欄的文字 (通常是 cells[1])
        // 這樣就不會因為 ID 是 #15 而誤抓了
        const userInfoText = rows[i].cells[1] ? rows[i].cells[1].innerText.toUpperCase() : "";
        const equipNameText = rows[i].cells[2] ? rows[i].cells[2].innerText.toUpperCase() : "";
        
        // 只要 姓名資訊 或 設備名稱 包含輸入的關鍵字就顯示
        const isMatch = userInfoText.includes(input) || equipNameText.includes(input);
        const isPending = rows[i].innerText.includes("待審核");
        
        rows[i].style.display = isMatch ? "" : "none";
        
        if (isMatch && isPending) {
            pendingCount++;
        }
    }
    
    // 更新上方數字顯示
    document.getElementById('filteredCount').innerText = pendingCount;
}

        // 3. 🌟 精準批量處理 (修正暴力抓取 ID)
        async function processFiltered(action) {
            const pendingIds = [];
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            for (let row of rows) {
                if (row.style.display !== "none" && row.innerText.includes("待審核")) {
                    const tid = row.cells[0].innerText.replace(/[^0-9]/g, '').trim();
                    if(tid) pendingIds.push(tid);
                }
            }

            if (pendingIds.length === 0) return alert("畫面上沒有可操作的申請！");
            if (!confirm(`確認針對目前搜尋結果的 ${pendingIds.length} 筆執行「${action}」？`)) return;

            const btn = action === '核准' ? document.getElementById('btnFilterApprove') : document.getElementById('btnFilterReject');
            const originalText = btn.innerText;
            btn.classList.add('loading-active');

            for (let i = 0; i < pendingIds.length; i++) {
                btn.innerText = `⏳ (${i+1}/${pendingIds.length})`;
                await fetch(`${API_URL}/admin/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "交易編號": pendingIds[i], "動作": action, "點收幹部": localStorage.getItem('adminName') })
                });
                await new Promise(r => setTimeout(r, 600)); 
            }

            alert("批量處理完成！");
            btn.innerText = originalText;
            btn.classList.remove('loading-active');
            loadTransactions();
        }

        function processSingle(tid, action) {
            if(!confirm(`確定${action}？`)) return;
            fetch(`${API_URL}/admin/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "動作": action, "點收幹部": localStorage.getItem('adminName') })
            }).then(() => loadTransactions());
        }

        function returnItem(tid, name) {
            if(!confirm(`點收「${name}」？`)) return;
            fetch(`${API_URL}/return`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "點收幹部": localStorage.getItem('adminName') })
            }).then(() => loadTransactions());
        }

       function batchReturn() {
    const sid = document.getElementById('batchSid').value.trim();
    if (sid.length < 3) return alert("請輸入學號末三碼！");
    
    const adminName = localStorage.getItem('adminName');
    if (!confirm(`確定要歸還學號末三碼為 "${sid}" 的所有設備嗎？`)) return;

    const btn = document.getElementById('batchBtn');
    btn.innerText = "⏳";
    btn.disabled = true;

    fetch(`${API_URL}/return_by_student`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ "學號": sid, "點收幹部": adminName })
    })
    .then(res => res.json())
    .then(data => {
        if (data.成功) {
            alert(`✅ 點收成功！已自動歸還 ${data.歸還數量} 件設備。`);
            document.getElementById('batchSid').value = '';
            loadTransactions();
        } else {
            alert("❌ " + data.訊息);
        }
    })
    .finally(() => {
        btn.innerText = "全歸還";
        btn.disabled = false;
    });
}

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
