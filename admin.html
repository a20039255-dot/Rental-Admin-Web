<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部點收與審核系統 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .pending-row { border-left: 6px solid #fbbf24; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .overdue-alert { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-slate-800 text-white p-4 shadow-xl border-b border-slate-700">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl flex items-center tracking-tight">
                <span class="bg-blue-600 p-2 rounded-xl mr-3 shadow-inner">🛠️</span>
                設備管理後台 <span class="ml-3 px-3 py-1 bg-slate-700 rounded-full text-[10px] text-blue-300 border border-slate-600 font-mono" id="adminTag">載入中...</span>
            </h1>
            <div class="flex items-center gap-6">
                <span id="currentTime" class="hidden md:block text-slate-400 text-xs font-mono"></span>
                <button onclick="logout()" class="text-slate-400 hover:text-red-400 transition font-bold text-sm">登出系統</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h3 class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-[0.2em]">快速過濾管理紀錄</h3>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">🔍</span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋學號、姓名、單位、電話、設備或處理人..." 
                        class="w-full pl-12 pr-4 py-4 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50 focus:bg-white text-sm">
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 text-white">
                <h3 class="text-[10px] font-black text-slate-500 mb-3 uppercase tracking-[0.2em]">學號批量點收</h3>
                <div class="flex gap-2">
                    <input type="text" id="batchSid" placeholder="輸入學號..." 
                        class="flex-1 px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none font-mono text-white placeholder-slate-500 text-sm">
                    <button onclick="batchReturn()" id="batchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-black shadow-lg transition transform active:scale-95 text-xs">
                        全歸還
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                <div>
                    <h2 class="text-lg font-black text-gray-800">借用與申請管理清單</h2>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">即時讀取 Google Sheets 雲端大腦</p>
                </div>
                <button onclick="loadTransactions()" class="flex items-center gap-2 bg-white border border-gray-200 px-5 py-2.5 rounded-xl text-xs font-black text-gray-600 hover:bg-gray-50 transition shadow-sm active:scale-95">
                    <span id="refreshIcon" class="inline-block">🔄</span> 重新整理
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em] border-b">
                            <th class="p-6 font-black">ID</th>
                            <th class="p-6 font-black">借用人資訊 (單位/電話)</th>
                            <th class="p-6 font-black">借用設備</th>
                            <th class="p-6 font-black text-center">狀態 / 處理幹部</th>
                            <th class="p-6 font-black text-right">管理決策</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            
            <div id="noData" class="hidden p-24 text-center">
                <div class="text-6xl mb-6 opacity-20">📦</div>
                <p class="text-gray-400 font-black text-lg">目前沒有任何待處理的申請或借用中設備</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        window.onload = function() {
            const name = localStorage.getItem('adminName');
            if(!name) return window.location.href = 'index.html';
            document.getElementById('adminTag').innerText = `部長：${name}`;
            loadTransactions();
            
            // 每秒更新時間
            setInterval(() => {
                document.getElementById('currentTime').innerText = new Date().toLocaleString();
            }, 1000);
        };

        // 1. 載入所有紀錄
        function loadTransactions() {
            const table = document.getElementById('transactionTable');
            const noData = document.getElementById('noData');
            const refreshIcon = document.getElementById('refreshIcon');
            
            refreshIcon.classList.add('animate-spin');
            table.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-300 font-bold tracking-widest animate-pulse italic">📡 正在同步雲端數據庫，請稍候...</td></tr>';

            fetch(`${API_URL}/transactions`)
                .then(res => res.json())
                .then(data => {
                    refreshIcon.classList.remove('animate-spin');
                    table.innerHTML = '';
                    const list = Object.values(data).sort((a, b) => b.交易編號 - a.交易編號);
                    
                    if(list.length === 0) {
                        noData.classList.remove('hidden');
                        return;
                    }

                    noData.classList.add('hidden');
                    list.forEach(t => {
                        const isPending = t.狀態 === "待審核";
                        const handler = t.處理人員 || "尚未核准";
                        
                        const tr = document.createElement('tr');
                        // 待審核項目使用黃色視覺提醒
                        tr.className = isPending ? "pending-row bg-amber-50/40 transition duration-300" : "hover:bg-gray-50 transition duration-150";
                        
                        tr.innerHTML = `
                            <td class="p-6 font-mono text-xs text-gray-300">#${t.交易編號}</td>
                            <td class="p-6">
                                <div class="font-black text-slate-800 text-sm">${t.租借人員姓名}</div>
                                <div class="text-[10px] text-slate-400 font-mono tracking-tighter mt-1 italic">${t.租借人員學號}</div>
                            </td>
                            <td class="p-6">
                                <span class="bg-white border-2 border-slate-100 px-3 py-2 rounded-xl text-xs font-black text-slate-700 shadow-sm">
                                    ${t.設備名稱}
                                </span>
                            </td>
                            <td class="p-6 text-center">
                                <span class="px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-[0.2em] border shadow-sm ${isPending ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}">
                                    ${t.狀態}
                                </span>
                                <div class="text-[9px] text-gray-400 mt-2 font-black italic">
                                    處理人: <span class="${isPending ? 'text-gray-300' : 'text-blue-500'}">${handler}</span>
                                </div>
                            </td>
                            <td class="p-6 text-right space-x-2">
                                ${isPending ? 
                                    `<button onclick="processAction(${t.交易編號}, '核准')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg transition transform active:scale-90">核准申請</button>
                                     <button onclick="processAction(${t.交易編號}, '駁回')" class="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg transition transform active:scale-90">駁回</button>` :
                                    `<button onclick="returnItem(${t.交易編號}, '${t.設備名稱}')" class="bg-slate-800 hover:bg-black text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg transition transform active:scale-90">點收歸還</button>`
                                }
                            </td>
                        `;
                        table.appendChild(tr);
                    });
                })
                .catch(err => {
                    refreshIcon.classList.remove('animate-spin');
                    table.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-red-400 font-black">❌ 雲端連線異常，請確認 Cloud Run 是否正常運作</td></tr>`;
                });
        }

        // 2. 🌟 核心：處理申請 (核准或駁回)
        function processAction(tid, action) {
            const adminName = localStorage.getItem('adminName');
            const confirmMsg = action === '核准' ? 
                `確定要核准申請 #${tid} 嗎？\n(核准後狀態將轉為「借用中」)` : 
                `確定要駁回申請 #${tid} 嗎？\n(駁回後系統將自動退回預扣的庫存)`;

            if(!confirm(confirmMsg)) return;

            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            fetch(`${API_URL}/admin/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "動作": action, "點收幹部": adminName })
            })
            .then(res => res.json())
            .then(data => {
                if(data.成功) {
                    loadTransactions(); 
                } else {
                    alert("⚠️ 處理失敗：" + data.訊息);
                }
            })
            .finally(() => {
                btns.forEach(b => b.disabled = false);
            });
        }

        // 3. 歸還點收
        function returnItem(tid, name) {
            if(!confirm(`確定已收到「${name}」並點收歸還嗎？`)) return;
            const adminName = localStorage.getItem('adminName');
            
            fetch(`${API_URL}/return`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "點收幹部": adminName })
            })
            .then(res => res.json())
            .then(data => {
                if(data.成功) loadTransactions();
                else alert("❌ 歸還失敗：" + data.訊息);
            });
        }

        // 4. 學號批量歸還
        function batchReturn() {
            const sid = document.getElementById('batchSid').value.trim();
            const adminName = localStorage.getItem('adminName');
            if (!sid) return alert("請輸入學號");
            if (!confirm(`確定要將學號 ${sid} 名下所有「借用中」的設備一次點收歸還嗎？`)) return;

            const btn = document.getElementById('batchBtn');
            btn.innerText = "⏳ 處理中";
            btn.disabled = true;

            fetch(`${API_URL}/return_by_student`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "學號": sid, "點收幹部": adminName })
            })
            .then(res => res.json())
            .then(data => {
                if (data.成功) {
                    alert(`✅ 批量處理成功！共點收 ${data.歸還數量} 項設備。`);
                    document.getElementById('batchSid').value = '';
                    loadTransactions();
                } else {
                    alert("❌ 失敗：" + data.訊息);
                }
            })
            .finally(() => {
                btn.innerText = "全歸還";
                btn.disabled = false;
            });
        }

        // 5. 即時關鍵字過濾
        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].innerText.toUpperCase();
                rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
