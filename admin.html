<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部管理後台 - 精準自動化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .pending-row { border-left: 6px solid #fbbf24; }
        .btn-loading { pointer-events: none; opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-slate-800 text-white p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl flex items-center tracking-tight">
                <span class="bg-blue-600 p-2 rounded-xl mr-3 shadow-inner">🛠️</span>
                設備管理後台 <span class="ml-3 px-3 py-1 bg-slate-700 rounded-full text-[10px] text-blue-300 border border-slate-600 font-mono" id="adminTag">載入中...</span>
            </h1>
            <button onclick="logout()" class="text-slate-400 hover:text-red-400 transition font-bold text-sm">登出系統</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h3 class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-[0.2em]">精準篩選與批量決策</h3>
                <div class="relative mb-4">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">🔍</span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋姓名、學號、單位或電話..." 
                        class="w-full pl-12 pr-4 py-4 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50 text-sm">
                </div>
                
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-blue-50/50 p-4 rounded-2xl border border-dashed border-blue-200">
                    <div class="text-xs font-bold text-blue-600">
                        目前搜尋結果中：<span id="filteredCount" class="text-lg">0</span> 筆待審核
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="processFiltered('核准')" id="btnFilterApprove" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-md transition transform active:scale-95">
                            ✅ 搜尋結果全核准
                        </button>
                        <button onclick="processFiltered('駁回')" id="btnFilterReject" class="flex-1 md:flex-none bg-rose-500 hover:bg-rose-600 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-md transition transform active:scale-95">
                            ❌ 搜尋結果全駁回
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 text-white flex flex-col justify-center">
                <h3 class="text-[10px] font-black text-slate-500 mb-3 uppercase tracking-[0.2em]">學號批量點收歸還</h3>
                <div class="flex gap-2">
                    <input type="text" id="batchSid" placeholder="輸入學號..." 
                        class="flex-1 px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none font-mono text-white text-sm">
                    <button onclick="batchReturn()" id="batchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-black shadow-lg transition text-xs">
                        全歸還
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                <h2 class="text-lg font-black text-gray-800 tracking-tight">管理清單</h2>
                <button onclick="loadTransactions()" class="flex items-center gap-2 bg-white border border-gray-200 px-5 py-2.5 rounded-xl text-xs font-black text-gray-600 hover:bg-gray-50 transition shadow-sm active:scale-95">
                    <span id="refreshIcon">🔄</span> 重新整理
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em] border-b">
                            <th class="p-6">ID</th>
                            <th class="p-6">借用人資訊</th>
                            <th class="p-6">設備品項</th>
                            <th class="p-6 text-center">狀態 / 處理幹部</th>
                            <th class="p-6 text-right">管理決策</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-24 text-center text-gray-400 font-black">目前沒有待處理事項</div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        window.onload = function() {
            const name = localStorage.getItem('adminName');
            if(!name) return window.location.href = 'index.html';
            document.getElementById('adminTag').innerText = `部長：${name}`;
            loadTransactions();
        };

        // 1. 載入紀錄
        function loadTransactions() {
            const table = document.getElementById('transactionTable');
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('animate-spin');
            table.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-300 font-bold animate-pulse">📡 同步雲端大腦中...</td></tr>';

            fetch(`${API_URL}/transactions`)
                .then(res => res.json())
                .then(data => {
                    refreshIcon.classList.remove('animate-spin');
                    table.innerHTML = '';
                    const list = Object.values(data).sort((a, b) => b.交易編號 - a.交易編號);
                    if(list.length === 0) { document.getElementById('noData').classList.remove('hidden'); return; }
                    document.getElementById('noData').classList.add('hidden');

                    list.forEach(t => {
                        const isPending = t.狀態 === "待審核";
                        const tr = document.createElement('tr');
                        tr.className = isPending ? "pending-row bg-amber-50/40 transition" : "hover:bg-gray-50 transition";
                        
                        tr.innerHTML = `
                            <td class="p-6 font-mono text-xs text-gray-300">#${t.交易編號}</td>
                            <td class="p-6">
                                <div class="font-black text-slate-800 text-sm">${t.租借人員姓名}</div>
                                <div class="text-[10px] text-slate-400 font-mono mt-1 italic">${t.租借人員學號}</div>
                            </td>
                            <td class="p-6">
                                <span class="bg-white border-2 border-slate-100 px-3 py-2 rounded-xl text-xs font-black text-slate-700 shadow-sm">${t.設備名稱}</span>
                            </td>
                            <td class="p-6 text-center">
                                <span class="px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-[0.2em] border ${isPending ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}">
                                    ${t.狀態}
                                </span>
                                <div class="text-[9px] text-gray-400 mt-2 font-black italic">處理人: <span class="${isPending?'text-gray-300':'text-blue-500'}">${t.處理人員||'尚未核准'}</span></div>
                            </td>
                            <td class="p-6 text-right space-x-2">
                                ${isPending ? 
                                    `<button onclick="processSingle(${t.交易編號}, '核准')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">核准</button>
                                     <button onclick="processSingle(${t.交易編號}, '駁回')" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">駁回</button>` :
                                    `<button onclick="returnItem(${t.交易編號}, '${t.設備名稱}')" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg">點收歸還</button>`
                                }
                            </td>`;
                        table.appendChild(tr);
                    });
                    filterTable(); // 重新計算過濾數量
                });
        }

        // 2. 🌟 核心：搜尋過濾與即時計數
        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            let pendingCount = 0;
            
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].innerText.toUpperCase();
                const isMatch = text.includes(input);
                const isPending = rows[i].innerText.includes("待審核");
                
                rows[i].style.display = isMatch ? "" : "none";
                if (isMatch && isPending) pendingCount++;
            }
            document.getElementById('filteredCount').innerText = pendingCount;
        }

        // 3. 🌟 核心：精準批量處理 (只針對搜尋結果)
        async function processFiltered(action) {
            const pendingIds = [];
            const rows = document.getElementById("transactionTable").getElementsByTagName("tr");
            
            for (let row of rows) {
                if (row.style.display !== "none" && row.innerText.includes("待審核")) {
                    const tid = row.cells[0].innerText.replace('#', '');
                    pendingIds.push(tid);
                }
            }

            if (pendingIds.length === 0) return alert("目前畫面上沒有可操作的申請件！");
            if (!confirm(`確認要針對目前搜尋結果的 ${pendingIds.length} 筆申請執行「${action}」嗎？`)) return;

            const adminName = localStorage.getItem('adminName');
            const btn = action === '核准' ? document.getElementById('btnFilterApprove') : document.getElementById('btnFilterReject');
            const originalText = btn.innerText;
            
            btn.classList.add('btn-loading');
            let success = 0;

            for (let i = 0; i < pendingIds.length; i++) {
                btn.innerText = `⏳ (${i+1}/${pendingIds.length})`;
                try {
                    const res = await fetch(`${API_URL}/admin/approve`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "交易編號": pendingIds[i], "動作": action, "點收幹部": adminName })
                    });
                    if ((await res.json()).成功) success++;
                    await new Promise(r => setTimeout(r, 600)); // 保護 API 間隔
                } catch (e) {}
            }

            alert(`✅ 批量處理完成！成功：${success} 件`);
            btn.innerText = originalText;
            btn.classList.remove('btn-loading');
            loadTransactions();
        }

        function processSingle(tid, action) {
            const adminName = localStorage.getItem('adminName');
            if(!confirm(`確定${action}此筆申請？`)) return;
            fetch(`${API_URL}/admin/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "動作": action, "點收幹部": adminName })
            }).then(() => loadTransactions());
        }

        function returnItem(tid, name) {
            if(!confirm(`確認點收「${name}」？`)) return;
            const adminName = localStorage.getItem('adminName');
            fetch(`${API_URL}/return`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "交易編號": tid, "點收幹部": adminName })
            }).then(() => loadTransactions());
        }

        function batchReturn() {
            const sid = document.getElementById('batchSid').value.trim();
            if (!sid) return alert("請輸入學號");
            const btn = document.getElementById('batchBtn');
            btn.innerText = "⏳";
            fetch(`${API_URL}/return_by_student`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "學號": sid, "點收幹部": localStorage.getItem('adminName') })
            }).then(() => { loadTransactions(); btn.innerText = "全歸還"; });
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
