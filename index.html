<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備管理系統 - 幹部登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen font-sans">
    <div class="bg-gray-800 p-10 rounded-3xl shadow-2xl w-[420px] border border-gray-700">
        <div class="text-5xl mb-6 text-center">🔐</div>
        <h1 class="text-2xl font-bold text-white text-center mb-2">設備部管理後台</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">請輸入您的管理代號以進入系統</p>
        
        <div class="space-y-6">
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">幹部代號</label>
                <input type="password" id="adminCode" class="w-full px-4 py-4 bg-gray-700 border border-gray-600 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none transition text-center text-xl tracking-[1em]" placeholder="••••">
            </div>
            <button onclick="adminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition duration-200 transform active:scale-95">
                進入管理系統
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        async function login() {
    const code = document.getElementById('adminCode').value;
    const btn = document.querySelector('button');
    btn.innerText = "驗證中...";
    
    try {
        const res = await fetch(`${API_URL}/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "代號": code })
        });
        
        // 🌟 新增：如果 API 回傳 404 或 500
        if (!res.ok) {
            const errData = await res.json();
            alert(`登入失敗 (${res.status}): ${errData.detail || '後端錯誤'}`);
            return;
        }

        const data = await res.json();
        if (data.成功) {
            localStorage.setItem('adminName', data.姓名);
            window.location.href = 'admin.html';
        } else {
            alert("登入失敗：" + data.訊息);
        }
    } catch (e) {
        // 🌟 這裡會抓到連不上的錯誤
        alert("連線失敗：請確認後端 API 是否正常運作！\n錯誤訊息：" + e.message);
    } finally {
        btn.innerText = "進入管理系統";
    }
}
    </script>
</body>
</html>
