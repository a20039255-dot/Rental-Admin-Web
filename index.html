<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備管理系統 - 幹部登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-10 rounded-2xl shadow-2xl w-[400px] border border-gray-700">
        <div class="text-4xl mb-4 text-center">🔐</div>
        <h1 class="text-2xl font-bold text-white text-center mb-8">設備部管理後台</h1>
        
        <div class="space-y-6">
            <div>
                <label class="block text-gray-400 text-sm mb-2">幹部代號</label>
                <input type="password" id="adminCode" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="請輸入管理代號">
            </div>
            <button onclick="adminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200">
                登入系統
            </button>

        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        function adminLogin() {
            const code = document.getElementById('adminCode').value;
            if(!code) return alert("請輸入代號");

            fetch(`${API_URL}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "幹部代號": code })
            })
            .then(res => res.json())
            .then(data => {
                if(data.成功) {
                    localStorage.setItem('adminName', data.名稱);
                    localStorage.setItem('adminRole', data.職位);
                    window.location.href = 'admin.html';
                } else {
                    alert("登入失敗：" + data.訊息);
                }
            })
            .catch(err => alert("後端連線異常"));
        }
    </script>
</body>
</html>
